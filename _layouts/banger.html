---
layout: default
body_classes: page-banger
---

<div class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10">
        <div class="content">
          <div class="banger-header">
            <h1 class="banger-title">{{ page.title }}</h1>
            {% if page.artist %}
              <p class="banger-artist">by {{ page.artist }}</p>
            {% endif %}
            {% if page.source %}
              <p class="banger-source"><a href="{{ page.source }}">listen to it</a></p>
            {% endif %}
          </div>
          {{ content }}
          <p class="banger-back"><a href="/bangers/">← back to bangers</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
