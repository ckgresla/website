name: Deploy site to GitHub Pages

# GitHub's default Pages builder forces its latest github-pages gem
# (Jekyll 3.10), which crashes compiling main.scss. This site's pinned gem set
# (Jekyll 3.9 / Liquid 4.0.4) only parses correctly on Ruby 2.6 (Liquid 4.0.4
# mis-tokenizes on Ruby 2.7+), and Ruby 2.6 is gone from GitHub runners.
# So we build inside a ruby:2.6 container to match the working local setup.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Jekyll (Ruby 2.6 container)
        run: |
          docker run --rm -v "$PWD":/site -w /site -e JEKYLL_ENV=production ruby:2.6 \
            bash -c "gem install bundler -v 2.3.26 --no-document && bundle _2.3.26_ install --jobs 4 && bundle _2.3.26_ exec jekyll build"
      - name: Fix artifact permissions
        run: sudo chown -R "$(id -u):$(id -g)" _site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
