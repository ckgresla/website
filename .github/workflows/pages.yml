name: Deploy site to GitHub Pages

# Build with the repo's own pinned Gemfile (github-pages 228 / Jekyll 3.9.x),
# instead of GitHub's default Pages builder which forces its latest gem set
# (github-pages 232 / Jekyll 3.10) and breaks the SCSS compile.
#
# Pinned to Ruby 2.7 (on ubuntu-22.04, which still ships it): this gem set uses
# Liquid 4.0.4, whose case/when parser breaks on Ruby 3.x ("Unknown tag 'when'").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
          bundler-cache: true
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --verbose --trace --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
