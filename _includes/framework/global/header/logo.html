{% assign is_home = false %}
{% if page.url == '/' or page.url == '/index.html' or page.url == site.baseurl %}{% assign is_home = true %}{% endif %}
<div class="logos {% if is_home %}active{% endif %}">
  <div class="logo {% if is_home %}active{% endif %}">
    <div class="logo-image">
      <a href="{{ site.baseurl }}/" aria-label="{{ site.title }} — home">
        <!-- Magician's wand: black rod with white tip-bands (auto-inverts in dark
             mode via currentColor + --color-primary). The tip symbol is injected
             by wand.js on nav hover; the favicon updates live alongside it. -->
        <svg class="logo-wand" viewBox="8 11 28 28"
             fill="none" stroke-linecap="round" role="img"
             aria-label="{{ site.title }} Logo">
          <!-- Black rod flowing into a white cylindrical tip. Rod = currentColor;
               the tip is a slightly-inset --color-primary stroke, so the rod forms
               a hairline keyline around it (keeps the white tip visible on a white
               page) and the whole thing inverts in dark mode. -->
          <path class="wand-rod" d="M11.79 36.21 33 15" stroke="currentColor" stroke-width="6.8"/>
          <path class="wand-cap" d="M29.44 18.56 33 15" stroke-width="6"/>
        </svg>
      </a>
    </div>

    {% if site.logo.show_logo_text_on_desktop %}
      <div class="logo-text"><a href="{{ site.baseurl }}/">{{ site.logo.logo_text }}</a></div>
    {% endif %}
  </div>
</div>
